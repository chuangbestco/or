<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OR 账号信息回填</title><link rel="stylesheet" href="/static/style.css"></head>
<body><main>
<header><p class="eyebrow">LOCAL TOOL · OPENROUTER</p><h1>账号信息回填</h1><p>校验 AdsPower 连接、回填注册时间/IP/卡尾，并确认所有账号余额不低于 1。</p></header>
<section><div class="section-title"><h2>1. AdsPower 连接</h2><span id="savedTag" class="tag" hidden>已保存到本机</span></div><div class="grid"><label>连接地址<input id="baseUrl" value="http://127.0.0.1:50325" placeholder="http://127.0.0.1:50325"></label><label>API Key<input id="apiKey" type="password" placeholder="首次使用请填写 API Key"></label></div><button id="saveConn">保存并校验连接</button><div id="connStatus" class="status"></div></section>
<section><h2>2. 上传与字段校验</h2><p class="hint">支持 CSV / XLSX。须有 account_id、AK、MK、bank_card_tail 的实际内容，并包含 register_time、register_ip、charge_ip、remark 表头。</p><input id="file" type="file" accept=".csv,.xlsx"><div id="fileStatus" class="status"></div></section>
<section><h2>3. 执行回填</h2><button id="run" disabled>执行回填</button><div id="progressWrap" class="progress-wrap" hidden><div class="progress-meta"><span id="progressText">准备中…</span><strong id="progressPercent">0%</strong></div><div class="progress"><i id="progressBar"></i></div></div><div id="runStatus" class="status"></div><a id="download" class="button-link" hidden>下载csv</a></section>
</main><script src="/static/app.js"></script></body></html>
